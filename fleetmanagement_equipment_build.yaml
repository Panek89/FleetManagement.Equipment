trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: "ubuntu-latest"

variables:
  - group: FleetManagement_Infrastructure

stages:
  - stage: Build_NET
    displayName: ".NET Build"
    jobs:
      - job: Build
        displayName: "Restore and Build"
        steps:
          - task: DotNetCoreCLI@2
            displayName: "Restore Solution"
            inputs:
              command: "restore"
              projects: "FleetManagement.Equipment.sln"

          - task: DotNetCoreCLI@2
            displayName: "Build Solution"
            inputs:
              command: "build"
              projects: "FleetManagement.Equipment.sln"
              arguments: "--configuration Release"

  - stage: Build_Push_Docker
    displayName: "Docker Build and Push"
    dependsOn: Build_NET
    condition: succeeded()
    jobs:
      - job: Docker
        displayName: "Docker Job"
        steps:
          - task: Docker@2
            displayName: "Build Equipment Image"
            inputs:
              containerRegistry: "$(fm_docker_hub_service_connection_name)"
              repository: "$(fm_docker_repository_equipment)"
              command: "build"
              Dockerfile: "$(Build.SourcesDirectory)/Dockerfile"
              buildContext: "$(Build.SourcesDirectory)"
              tags: |
                $(Build.BuildId)
                latest

          - task: Docker@2
            displayName: "Push Equipment Image"
            condition: and(succeeded(), or(eq(variables['Build.Reason'], 'IndividualCI'), eq(variables['Build.Reason'], 'Manual')))
            inputs:
              containerRegistry: "$(fm_docker_hub_service_connection_name)"
              repository: "$(fm_docker_repository_equipment)"
              command: "push"
              tags: |
                $(Build.BuildId)
                latest

  - stage: Wake_Up_Database
    displayName: "Wake Up SQL Database"
    dependsOn: Build_Push_Docker
    condition: and(succeeded(), or(eq(variables['Build.Reason'], 'IndividualCI'), eq(variables['Build.Reason'], 'Manual')))
    jobs:
      - job: WakeUpDb
        displayName: "Ensure Database is Online"
        steps:
          - task: AzureCLI@2
            displayName: "Wake up SQL Database"
            inputs:
              azureSubscription: "$(azurerm_service_connection)"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                SERVER="$(fm_mssql_server_name)-$(fm_suffix)-$(fm_default-env-suffix)"
                DB="mssql-dbequipment-$(fm_suffix)-$(fm_default-env-suffix)"
                RG="$(fm_resource_group_name)"

                echo "Checking database status..."
                STATUS=$(az sql db show --resource-group "$RG" --server "$SERVER" --name "$DB" --query "status" -o tsv)
                echo "Current status: $STATUS"

                if [ "$STATUS" != "Online" ]; then
                  echo "Database is not online ($STATUS). Triggering resume via TCP connection..."
                  python3 - <<'EOF'
                import socket, time, sys
                host = "$SERVER.database.windows.net"
                for attempt in range(1, 6):
                    try:
                        s = socket.create_connection((host, 1433), timeout=10)
                        s.close()
                        print(f"TCP connection succeeded on attempt {attempt} - resume triggered")
                        sys.exit(0)
                    except Exception as e:
                        print(f"Attempt {attempt}: {e}")
                        time.sleep(5)
                EOF
                  echo "Waiting for database to come online..."
                  for i in $(seq 1 20); do
                    STATUS=$(az sql db show --resource-group "$RG" --server "$SERVER" --name "$DB" --query "status" -o tsv)
                    echo "  Status: $STATUS"
                    [ "$STATUS" = "Online" ] && break
                    sleep 15
                  done
                fi

                echo "Database is $STATUS"
                [ "$STATUS" = "Online" ] || exit 1
