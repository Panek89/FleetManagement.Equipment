trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: "ubuntu-latest"

variables:
  - group: FleetManagement_Infrastructure
  - group: Terraform_Backend

stages:
  - stage: Build_NET
    displayName: ".NET Build"
    jobs:
      - job: Build
        displayName: "Restore and Build"
        steps:
          - task: DotNetCoreCLI@2
            displayName: "Restore Solution"
            inputs:
              command: "restore"
              projects: "FleetManagement.Equipment.sln"

          - task: DotNetCoreCLI@2
            displayName: "Build Solution"
            inputs:
              command: "build"
              projects: "FleetManagement.Equipment.sln"
              arguments: "--configuration Release"

  - stage: Build_Push_Docker
    displayName: "Docker Build and Push"
    dependsOn: Build_NET
    condition: succeeded()
    jobs:
      - job: Docker
        displayName: "Docker Job"
        steps:
          - task: Docker@2
            displayName: "Build Equipment Image"
            inputs:
              containerRegistry: "$(fm_docker_hub_service_connection_name)"
              repository: "$(fm_docker_repository_equipment)"
              command: "build"
              Dockerfile: "$(Build.SourcesDirectory)/Dockerfile"
              buildContext: "$(Build.SourcesDirectory)"
              tags: |
                $(Build.BuildId)
                latest

          - task: Docker@2
            displayName: "Push Equipment Image"
            condition: and(succeeded(), or(eq(variables['Build.Reason'], 'IndividualCI'), eq(variables['Build.Reason'], 'Manual')))
            inputs:
              containerRegistry: "$(fm_docker_hub_service_connection_name)"
              repository: "$(fm_docker_repository_equipment)"
              command: "push"
              tags: |
                $(Build.BuildId)
                latest
