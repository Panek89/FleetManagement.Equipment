services:
  sql-db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: fleetmanagement-sql-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=MyPassword123!!
      - MSSQL_PID=StandardDeveloper
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "MyPassword123!!", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fleet-network

  api:
    image: fleet-management-equipment
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleetmanagement-equipment-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__SqlDatabase=Server=sql-db;Database=FleetManagement.Equipment;User Id=sa;Password=MyPassword123!!;Encrypt=True;TrustServerCertificate=True;
    depends_on:
      sql-db:
        condition: service_healthy
    networks:
      - fleet-network

networks:
  fleet-network:
    driver: bridge
